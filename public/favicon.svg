<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <!-- Cyan glow effect -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%" filterUnits="userSpaceOnUse">
      <feGaussianBlur stdDeviation="18" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <!-- Gradient for background or accents -->
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f0ff" />
      <stop offset="100%" stop-color="#0077ff" />
    </linearGradient>
  </defs>

  <!-- Dark smooth background circle for contrast in light/dark tabs -->
  <rect width="512" height="512" rx="128" fill="#080808" />
  
  <!-- Outer geometric border ring -->
  <rect x="32" y="32" width="448" height="448" rx="112" stroke="#00f0ff" stroke-width="12" stroke-opacity="0.15" />
  
  <!-- Glowing accent mark/corner -->
  <path d="M400 112H352M400 112V160" stroke="#00f0ff" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)" />

  <!-- Monogram JP -->
  <!-- The 'J' - Minimal, elegant white curve -->
  <path d="M190 170V310C190 340 170 360 140 360C110 360 90 340 90 310" stroke="#FFFFFF" stroke-width="32" stroke-linecap="round" stroke-linejoin="round" />
  
  <!-- The 'P' - Futuristic glowing cyan loop, overlapping J nicely -->
  <path d="M270 360V170H350C395 170 420 200 420 235C420 270 395 295 350 295H270" stroke="url(#cyanGrad)" stroke-width="32" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)" />
</svg>
